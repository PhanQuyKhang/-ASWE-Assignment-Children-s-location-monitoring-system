# Production-style stack: API + static SPA.
# Set VITE_API_URL to the browser-reachable API URL before building the web image.
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
    init: true

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_ONESIGNAL_APP_ID: ${VITE_ONESIGNAL_APP_ID:-}
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api
